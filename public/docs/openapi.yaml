            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Setting' }

  /admin/settings:
    get:
      tags: [Settings]
      summary: 'Admin: list all settings'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: settings.manage'
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: group
          schema: { type: string }
        - in: query
          name: is_public
          schema: { type: boolean }
      responses:
        '200':
          description: Setting list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Setting' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/settings/{setting}:
    get:
      tags: [Settings]
      summary: 'Admin: get a setting'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: settings.manage'
      parameters: [{ in: path, name: setting, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Setting
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Setting' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Settings]
      summary: 'Admin: update a setting'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: settings.manage'
      parameters: [{ in: path, name: setting, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value: { type: string, nullable: true }
                type: { type: string, enum: [string, integer, decimal, boolean, json] }
                group: { type: string, maxLength: 50 }
                description: { type: string, nullable: true, maxLength: 255 }
                is_public: { type: boolean }
      responses:
        '200':
          description: Setting updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Setting' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/admin-preferences:
    post:
      tags: [Settings]
      summary: 'Admin: create/set an admin preference for self'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: settings.manage. user_id must match the authenticated admin.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, key]
              properties:
                user_id: { type: integer }
                key: { type: string, maxLength: 100 }
                value: { type: string, nullable: true }
                type: { type: string, enum: [string, integer, decimal, boolean, json] }
      responses:
        '200':
          description: Admin preference set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminPreference' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/admin-preferences/{key}:
    put:
      tags: [Settings]
      summary: 'Admin: update an admin preference for self'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: settings.manage'
      parameters: [{ in: path, name: key, required: true, schema: { type: string } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value: { type: string, nullable: true }
                type: { type: string, enum: [string, integer, decimal, boolean, json] }
      responses:
        '200':
          description: Admin preference updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminPreference' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---------------------------------------------------------------------
  # Admin
  # ---------------------------------------------------------------------
  /admin/dashboard:
    get:
      tags: [Admin]
      summary: 'Admin: dashboard summary counters'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: reports.view'
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  users_count: { type: integer }
                  active_products_count: { type: integer }
                  low_stock_variants_count: { type: integer }
                  pending_orders_count: { type: integer }
                  unpaid_orders_count: { type: integer }
                  pending_returns_count: { type: integer }
                  new_contact_messages_count: { type: integer }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: 'Sanctum personal access token'
      description: >
        Obtain a token from POST /auth/register or POST /auth/login (returned
        in the `token` field) and send it as `Authorization: Bearer <token>`.

  parameters:
    PerPage:
      in: query
      name: per_page
      schema: { type: integer, minimum: 1, maximum: 100, default: 15 }
    Search:
      in: query
      name: search
      schema: { type: string }
    CategoryId:
      in: path
      name: category
      required: true
      schema: { type: integer }
    ProductId:
      in: path
      name: product
      required: true
      schema: { type: integer }
    ProductVariantId:
      in: path
      name: productVariant
      required: true
      schema: { type: integer }

  responses:
    MessageOnly:
      description: Success message
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
    Unauthenticated:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but lacking the required role/permission, or not the resource owner
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorBody' }
    CategoryList:
      description: Category list
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Category' }
    CategoryItem:
      description: Category
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Category' }
    ProductList:
      description: Product list
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Product' }
    ProductItem:
      description: Product
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Product' }
    ProductVariantList:
      description: Product variant list
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/ProductVariant' }
    ProductVariantItem:
      description: Product variant
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/ProductVariant' }
    CartItem:
      description: Cart
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Cart' }
    CartItemLine:
      description: Cart item
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CartLineItem' }

  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
        errors: { type: object, nullable: true }

    ValidationErrorBody:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    Category:
      type: object
      properties:
        id: { type: integer }
        parent_id: { type: integer, nullable: true }
        name: { type: string }
        slug: { type: string }
        gender: { type: string, nullable: true, enum: [men, women, unisex] }
        description: { type: string, nullable: true }
        is_active: { type: boolean }
        sort_order: { type: integer }

    CategoryWrite:
      type: object
      required: [name, slug]
      properties:
        parent_id: { type: integer, nullable: true }
        image_media_id: { type: integer, nullable: true }
        name: { type: string, maxLength: 255 }
        slug: { type: string, maxLength: 255 }
        gender: { type: string, nullable: true, enum: [men, women, unisex] }
        description: { type: string, nullable: true }
        is_active: { type: boolean }
        sort_order: { type: integer, minimum: 0 }

    Product:
      type: object
      properties:
        id: { type: integer }
        category_id: { type: integer }
        brand_id: { type: integer, nullable: true }
        name: { type: string }
        slug: { type: string }
        base_price: { type: number, format: float }
        compare_at_price: { type: number, format: float, nullable: true }
        gender: { type: string, nullable: true }
        badge: { type: string, nullable: true, enum: [new, hot] }
        is_active: { type: boolean }

    ProductWrite:
      type: object
      required: [category_id, name, slug, base_price]
      properties:
        brand_id: { type: integer, nullable: true }
        category_id: { type: integer }
        name: { type: string, maxLength: 255 }
        slug: { type: string, maxLength: 255 }
        short_description: { type: string, nullable: true, maxLength: 500 }
        description: { type: string, nullable: true }
        gender: { type: string, nullable: true, enum: [men, women, unisex] }
        badge: { type: string, nullable: true, enum: [new, hot] }
        base_price: { type: number, format: float, minimum: 0 }
        compare_at_price: { type: number, format: float, nullable: true }
        has_variants: { type: boolean }
        is_active: { type: boolean }
        is_new_arrival: { type: boolean }
        is_best_seller: { type: boolean }
        is_featured_drop: { type: boolean }
        sort_order: { type: integer, minimum: 0 }

    ProductVariant:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        color_id: { type: integer }
        size_id: { type: integer }
        sku: { type: string }
        barcode: { type: string, nullable: true }
        price_override: { type: number, format: float, nullable: true }
        stock: { type: integer }
        is_active: { type: boolean }

    ProductVariantWrite:
      type: object
      required: [product_id, color_id, size_id, sku]
      properties:
        product_id: { type: integer }
        color_id: { type: integer }
        size_id: { type: integer }
        sku: { type: string, maxLength: 255 }
        barcode: { type: string, nullable: true, maxLength: 255 }
        price_override: { type: number, format: float, nullable: true }
        stock: { type: integer, minimum: 0 }
        is_active: { type: boolean }

    Cart:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer, nullable: true }
        session_id: { type: string, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/CartLineItem' }

    CartLineItem:
      type: object
      properties:
        id: { type: integer }
        cart_id: { type: integer }
        product_variant_id: { type: integer }
        quantity: { type: integer }
        unit_price_snapshot: { type: number, format: float }

    Wishlist:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/WishlistItem' }

    WishlistItem:
      type: object
      properties:
        id: { type: integer }
        wishlist_id: { type: integer }
        product_id: { type: integer }
        product_variant_id: { type: integer, nullable: true }

    Address:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        label: { type: string, nullable: true }
        full_name: { type: string }
        phone: { type: string }
        governorate_id: { type: integer }
        city: { type: string }
        area: { type: string, nullable: true }
        street: { type: string }
        building: { type: string, nullable: true }
        floor: { type: string, nullable: true }
        postal_code: { type: string, nullable: true }
        is_default: { type: boolean }

    AddressWrite:
      type: object
      required: [user_id, full_name, phone, governorate_id, city, street]
      properties:
        user_id: { type: integer, description: 'Must match the authenticated user' }
        label: { type: string, nullable: true, maxLength: 50 }
        full_name: { type: string, maxLength: 150 }
        phone: { type: string, maxLength: 20 }
        governorate_id: { type: integer }
        city: { type: string, maxLength: 100 }
        area: { type: string, nullable: true, maxLength: 150 }
        street: { type: string, maxLength: 200 }
        building: { type: string, nullable: true, maxLength: 50 }
        floor: { type: string, nullable: true, maxLength: 20 }
        postal_code: { type: string, nullable: true, maxLength: 20 }
        is_default: { type: boolean }

    Order:
      type: object
      properties:
        id: { type: integer }
        order_number: { type: string }
        user_id: { type: integer, nullable: true }
        guest_email: { type: string, nullable: true }
        guest_phone: { type: string, nullable: true }
        currency_id: { type: integer }
        currency_code: { type: string }
        status: { type: string, enum: [pending_confirmation, confirmed, processing, shipped, delivered, cancelled, returned] }
        payment_status: { type: string, example: unpaid }
        payment_method: { type: string }
        subtotal: { type: number, format: float }
        shipping_fee: { type: number, format: float }
        discount_total: { type: number, format: float }
        grand_total: { type: number, format: float }
        coupon_id: { type: integer, nullable: true }
        customer_notes: { type: string, nullable: true }
        admin_notes: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        payments:
          type: array
          items: { $ref: '#/components/schemas/Payment' }
        created_at: { type: string, format: date-time }

    OrderItem:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        product_variant_id: { type: integer, nullable: true }
        product_name: { type: string }
        sku: { type: string }
        color_name: { type: string }
        size_name: { type: string }
        quantity: { type: integer }
        unit_price: { type: number, format: float }
        line_total: { type: number, format: float }

    Payment:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        provider: { type: string }
        provider_reference: { type: string, nullable: true }
        amount: { type: number, format: float }
        currency: { type: string }
        status: { type: string, example: pending }
        metadata: { type: object, nullable: true }
        paid_at: { type: string, format: date-time, nullable: true }
        refunds:
          type: array
          items: { $ref: '#/components/schemas/Refund' }

    Refund:
      type: object
      properties:
        id: { type: integer }
        payment_id: { type: integer }
        order_id: { type: integer }
        amount: { type: number, format: float }
        reason: { type: string, nullable: true }
        status: { type: string, enum: [pending, processed, failed] }
        processed_at: { type: string, format: date-time, nullable: true }

    ReturnRequest:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        order_item_id: { type: integer }
        type: { type: string, enum: [exchange, return] }
        reason: { type: string }
        status: { type: string, enum: [pending, approved, rejected, completed] }
        admin_notes: { type: string, nullable: true }
        requested_at: { type: string, format: date-time }
        resolved_at: { type: string, format: date-time, nullable: true }

    Coupon:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        type: { type: string, enum: [percent, fixed] }
        value: { type: number, format: float }
        min_order_total: { type: number, format: float, nullable: true }
        max_discount: { type: number, format: float, nullable: true }
        usage_limit: { type: integer, nullable: true }
        used_count: { type: integer }
        starts_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        is_active: { type: boolean }

    CouponWrite:
      type: object
      required: [code, type, value]
      properties:
        code: { type: string, maxLength: 50 }
        type: { type: string, enum: [percent, fixed] }
        value: { type: number, format: float, minimum: 0 }
        min_order_total: { type: number, format: float, nullable: true }
        max_discount: { type: number, format: float, nullable: true }
        usage_limit: { type: integer, nullable: true }
        starts_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        is_active: { type: boolean }

    Campaign:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, enum: [flash_sale, seasonal, clearance] }
        discount_type: { type: string, enum: [percent, fixed, none] }
        discount_value: { type: number, format: float, nullable: true }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        is_active: { type: boolean }
        banner_media_id: { type: integer, nullable: true }

    CampaignWrite:
      type: object
      required: [name, slug, type, starts_at, ends_at]
      properties:
        name: { type: string, maxLength: 150 }
        slug: { type: string, maxLength: 170 }
        description: { type: string, nullable: true }
        type: { type: string, enum: [flash_sale, seasonal, clearance] }
        discount_type: { type: string, enum: [percent, fixed, none] }
        discount_value: { type: number, format: float, nullable: true }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        is_active: { type: boolean }
        banner_media_id: { type: integer, nullable: true }

    Setting:
      type: object
      properties:
        id: { type: integer }
        key: { type: string }
        value: { type: string, nullable: true }
        type: { type: string, enum: [string, integer, decimal, boolean, json] }
        group: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean }

    AdminPreference:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        key: { type: string }
        value: { type: string, nullable: true }
        type: { type: string, enum: [string, integer, decimal, boolean, json] }

    Media:
      type: object
      properties:
        id: { type: integer }
        uuid: { type: string, nullable: true }
        disk: { type: string }
        directory: { type: string }
        filename: { type: string }
        path: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        alt_text: { type: string, nullable: true }
        title: { type: string, nullable: true }
        uploaded_by: { type: integer, nullable: true }

    MediaWrite:
      type: object
      properties:
        uuid: { type: string, maxLength: 36 }
        disk: { type: string, maxLength: 50 }
        directory: { type: string, maxLength: 255 }
        filename: { type: string, maxLength: 255 }
        path: { type: string, maxLength: 500 }
        mime_type: { type: string, maxLength: 100 }
        size_bytes: { type: integer, minimum: 0 }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        alt_text: { type: string, nullable: true, maxLength: 255 }
        title: { type: string, nullable: true, maxLength: 255 }
