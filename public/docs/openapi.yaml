openapi: 3.0.3
info:
  title: AFIFI Backend API
  description: >
    REST API for the AFIFI e-commerce platform: catalog browsing, cart/wishlist,
    checkout, orders, payments, returns, coupons, campaigns, CMS, settings, and
    admin management. Authentication uses Laravel Sanctum bearer tokens.
  version: "1.0.0"
  contact:
    name: AFIFI Backend
servers:
  - url: /api
    description: API base path (relative to the application host)

security: []

tags:
  - name: Auth
    description: Registration, login, session/profile management
  - name: Catalog
    description: Categories, products, and product variants (public browsing + admin management)
  - name: Cart
    description: Authenticated customer shopping cart
  - name: Wishlist
    description: Authenticated customer wishlist
  - name: Address
    description: Customer address book
  - name: Checkout
    description: Cart-to-order checkout
  - name: Orders
    description: Customer order history and admin order status management
  - name: Payments
    description: Admin payment and refund management
  - name: Returns
    description: Customer return/exchange requests and admin status management
  - name: Coupons
    description: Admin coupon management and discount calculation
  - name: Campaigns
    description: Public active campaigns and admin campaign management
  - name: CMS
    description: Public content (homepage, banners, about, FAQ, policies) and admin media management
  - name: Settings
    description: Public/admin settings and admin preferences
  - name: Admin
    description: Admin dashboard reporting

paths:
  # ---------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, password, password_confirmation]
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email, nullable: true }
                phone: { type: string, maxLength: 20 }
                password: { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with phone/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string, description: 'Phone number or email address' }
                password: { type: string, format: password }
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out successfully
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/profile:
    put:
      tags: [Auth]
      summary: Update the authenticated user's profile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email, nullable: true }
                phone: { type: string, maxLength: 20 }
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/password:
    put:
      tags: [Auth]
      summary: Change the authenticated user's password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password: { type: string, format: password }
                password: { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        '200':
          description: Password changed successfully
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---------------------------------------------------------------------
  # Catalog (public + admin)
  # ---------------------------------------------------------------------
  /catalog/categories:
    get:
      tags: [Catalog]
      summary: List categories (public)
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: parent_id
          schema: { type: integer }
        - in: query
          name: gender
          schema: { type: string, enum: [men, women, unisex] }
        - in: query
          name: is_active
          schema: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/CategoryList' }

  /catalog/categories/{category}:
    get:
      tags: [Catalog]
      summary: Get a category (public)
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200': { $ref: '#/components/responses/CategoryItem' }
        '404': { $ref: '#/components/responses/NotFound' }

  /catalog/products:
    get:
      tags: [Catalog]
      summary: List products (public)
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: category_id
          schema: { type: integer }
        - in: query
          name: brand_id
          schema: { type: integer }
        - in: query
          name: gender
          schema: { type: string, enum: [men, women, unisex] }
        - in: query
          name: min_price
          schema: { type: number }
        - in: query
          name: max_price
          schema: { type: number }
      responses:
        '200': { $ref: '#/components/responses/ProductList' }

  /catalog/products/{product}:
    get:
      tags: [Catalog]
      summary: Get a product (public)
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200': { $ref: '#/components/responses/ProductItem' }
        '404': { $ref: '#/components/responses/NotFound' }

  /catalog/product-variants:
    get:
      tags: [Catalog]
      summary: List product variants (public)
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: product_id
          schema: { type: integer }
        - in: query
          name: in_stock
          schema: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/ProductVariantList' }

  /catalog/product-variants/{productVariant}:
    get:
      tags: [Catalog]
      summary: Get a product variant (public)
      parameters:
        - $ref: '#/components/parameters/ProductVariantId'
      responses:
        '200': { $ref: '#/components/responses/ProductVariantItem' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/categories:
    get:
      tags: [Catalog]
      summary: 'Admin: list categories'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.view'
      parameters: [{ $ref: '#/components/parameters/PerPage' }]
      responses:
        '200': { $ref: '#/components/responses/CategoryList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Catalog]
      summary: 'Admin: create category'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.create'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryWrite' }
      responses:
        '201': { $ref: '#/components/responses/CategoryItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/categories/{category}:
    get:
      tags: [Catalog]
      summary: 'Admin: get category'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.view'
      parameters: [{ $ref: '#/components/parameters/CategoryId' }]
      responses:
        '200': { $ref: '#/components/responses/CategoryItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Catalog]
      summary: 'Admin: update category'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.update'
      parameters: [{ $ref: '#/components/parameters/CategoryId' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryWrite' }
      responses:
        '200': { $ref: '#/components/responses/CategoryItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Catalog]
      summary: 'Admin: delete category'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.delete'
      parameters: [{ $ref: '#/components/parameters/CategoryId' }]
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/products:
    get:
      tags: [Catalog]
      summary: 'Admin: list products'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.view'
      parameters: [{ $ref: '#/components/parameters/PerPage' }]
      responses:
        '200': { $ref: '#/components/responses/ProductList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Catalog]
      summary: 'Admin: create product'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.create'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWrite' }
      responses:
        '201': { $ref: '#/components/responses/ProductItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/products/{product}:
    get:
      tags: [Catalog]
      summary: 'Admin: get product'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.view'
      parameters: [{ $ref: '#/components/parameters/ProductId' }]
      responses:
        '200': { $ref: '#/components/responses/ProductItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Catalog]
      summary: 'Admin: update product'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.update'
      parameters: [{ $ref: '#/components/parameters/ProductId' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWrite' }
      responses:
        '200': { $ref: '#/components/responses/ProductItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Catalog]
      summary: 'Admin: delete product'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.delete'
      parameters: [{ $ref: '#/components/parameters/ProductId' }]
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/product-variants:
    get:
      tags: [Catalog]
      summary: 'Admin: list product variants'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.view'
      parameters: [{ $ref: '#/components/parameters/PerPage' }]
      responses:
        '200': { $ref: '#/components/responses/ProductVariantList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Catalog]
      summary: 'Admin: create product variant'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.create'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductVariantWrite' }
      responses:
        '201': { $ref: '#/components/responses/ProductVariantItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/product-variants/{productVariant}:
    get:
      tags: [Catalog]
      summary: 'Admin: get product variant'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.view'
      parameters: [{ $ref: '#/components/parameters/ProductVariantId' }]
      responses:
        '200': { $ref: '#/components/responses/ProductVariantItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Catalog]
      summary: 'Admin: update product variant'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.update'
      parameters: [{ $ref: '#/components/parameters/ProductVariantId' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductVariantWrite' }
      responses:
        '200': { $ref: '#/components/responses/ProductVariantItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Catalog]
      summary: 'Admin: delete product variant'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: products.delete'
      parameters: [{ $ref: '#/components/parameters/ProductVariantId' }]
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------
  # Cart
  # ---------------------------------------------------------------------
  /cart:
    get:
      tags: [Cart]
      summary: Get the current user's cart
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/CartItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
    delete:
      tags: [Cart]
      summary: Clear the current user's cart
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /cart/items:
    post:
      tags: [Cart]
      summary: Add an item to the cart
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_variant_id, quantity]
              properties:
                product_variant_id: { type: integer }
                quantity: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '200':
          description: >
            Cart item added or quantity merged into an existing line. `unit_price_snapshot`
            is computed server-side from the variant's `price_override` (falling back to
            the product's `base_price`) and cannot be supplied by the client.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CartLineItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /cart/items/{cartItem}:
    put:
      tags: [Cart]
      summary: Update a cart item's quantity
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: cartItem
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '200': { $ref: '#/components/responses/CartItemLine' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Cart]
      summary: Remove a cart item
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: cartItem
          required: true
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Wishlist
  # ---------------------------------------------------------------------
  /wishlist:
    get:
      tags: [Wishlist]
      summary: Get the current user's wishlist
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Wishlist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Wishlist' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /wishlist/items:
    post:
      tags: [Wishlist]
      summary: Add an item to the wishlist
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id: { type: integer }
                product_variant_id: { type: integer, nullable: true }
      responses:
        '200':
          description: Wishlist item added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WishlistItem' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /wishlist/items/{wishlistItem}:
    delete:
      tags: [Wishlist]
      summary: Remove a wishlist item
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: wishlistItem
          required: true
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Address
  # ---------------------------------------------------------------------
  /addresses:
    get:
      tags: [Address]
      summary: List the current user's addresses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
    post:
      tags: [Address]
      summary: Create an address
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressWrite' }
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /addresses/{address}:
    get:
      tags: [Address]
      summary: Get an address (owner only)
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: address, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Address
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Address]
      summary: Update an address (owner only)
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: address, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressWrite' }
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Address]
      summary: Delete an address (owner only)
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: address, required: true, schema: { type: integer } }]
      responses:
        '200': { $ref: '#/components/responses/MessageOnly' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  /addresses/{address}/default:
    put:
      tags: [Address]
      summary: Set an address as the default (owner only)
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: address, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Default address set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Checkout
  # ---------------------------------------------------------------------
  /checkout:
    post:
      tags: [Checkout]
      summary: Checkout the current cart into an order
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_method, address]
              properties:
                currency_id: { type: integer }
                currency_code: { type: string, minLength: 3, maxLength: 3 }
                shipping_fee: { type: number }
                shipping_rate_id: { type: integer }
                coupon_id: { type: integer }
                coupon_code: { type: string, maxLength: 50 }
                payment_method: { type: string, maxLength: 30, example: cod }
                payment_provider: { type: string, maxLength: 30 }
                payment_metadata: { type: object, nullable: true }
                customer_notes: { type: string, nullable: true }
                reservation_expires_at: { type: string, format: date-time }
                address:
                  type: object
                  required: [full_name, phone, governorate_name, shipping_zone_code, city, street]
                  properties:
                    type: { type: string, enum: [shipping, billing] }
                    full_name: { type: string, maxLength: 150 }
                    phone: { type: string, maxLength: 20 }
                    governorate_name: { type: string, maxLength: 100 }
                    shipping_zone_code: { type: string, maxLength: 30 }
                    city: { type: string, maxLength: 100 }
                    area: { type: string, nullable: true, maxLength: 150 }
                    street: { type: string, maxLength: 200 }
                    building: { type: string, nullable: true, maxLength: 50 }
                    floor: { type: string, nullable: true, maxLength: 20 }
                    postal_code: { type: string, nullable: true, maxLength: 20 }
      responses:
        '201':
          description: Order created from checkout
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '422':
          description: Validation error or business rule violation (empty cart, insufficient stock, inactive variant, invalid/expired coupon, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------
  # Orders
  # ---------------------------------------------------------------------
  /orders:
    get:
      tags: [Orders]
      summary: List the current user's orders
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: payment_status
          schema: { type: string }
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /orders/{order}:
    get:
      tags: [Orders]
      summary: Get an order (owner only)
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: order, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  /orders/{order}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order (owner only)
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: order, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  order: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/orders/{order}/status:
    patch:
      tags: [Orders]
      summary: 'Admin: update order status'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: orders.update'
      parameters: [{ in: path, name: order, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending_confirmation, confirmed, processing, shipped, delivered, cancelled, returned]
                  description: Must be one of the allowed order status values; any other value returns 422.
                payment_status: { type: string, maxLength: 30 }
                admin_notes: { type: string, nullable: true }
                whatsapp_sent_at: { type: string, format: date-time, nullable: true }
                confirmed_at: { type: string, format: date-time, nullable: true }
                cancelled_at: { type: string, format: date-time, nullable: true }
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Validation failed (e.g. status is not one of the allowed enum values)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationErrorBody' }

  # ---------------------------------------------------------------------
  # Payments (Admin)
  # ---------------------------------------------------------------------
  /admin/payments:
    get:
      tags: [Payments]
      summary: 'Admin: list payments'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: payments.view'
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: provider
          schema: { type: string }
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Payment' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/payments/{payment}:
    get:
      tags: [Payments]
      summary: 'Admin: get payment'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: payments.view'
      parameters: [{ in: path, name: payment, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Payment
          content:
