              schema: { $ref: '#/components/schemas/Payment' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/payments/{payment}/paid:
    patch:
      tags: [Payments]
      summary: 'Admin: mark payment as paid'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: payments.view'
      parameters: [{ in: path, name: payment, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_reference: { type: string, nullable: true, maxLength: 255 }
                paid_at: { type: string, format: date-time, nullable: true }
      responses:
        '200':
          description: Payment marked as paid; order payment_status recalculated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/payments/{payment}/status:
    patch:
      tags: [Payments]
      summary: 'Admin: update payment status'
      security: [{ bearerAuth: [] }]
      description: 'Requires permission: payments.view'
      parameters: [{ in: path, name: payment, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, maxLength: 30 }
                provider_reference: { type: string, nullable: true }
                metadata: { type: object, nullable: true }
                paid_at: { type: string, format: date-time, nullable: true }
      responses:
        '200':
          description: Payment status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/payments/{payment}/refunds:
    post:
      tags: [Payments]
      summary: 'Admin: create a refund for a payment'
      security: [{ bearerAuth: [] }]
      description: >
        Requires permission: payments.view. Refund amount must not exceed the
        order's outstanding paid balance (paid minus already-processed refunds);
        otherwise returns 422.
      parameters: [{ in: path, name: payment, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, order_id, amount]
              properties:
                payment_id: { type: integer }
                order_id: { type: integer }
                amount: { type: number, format: float }
                reason: { type: string, nullable: true, maxLength: 500 }
                status: { type: string, enum: [pending, processed, failed] }
                processed_at: { type: string, format: date-time, nullable: true }
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Refund' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403':
          description: 'Forbidden, or payment_id/order_id mismatch with the path payment'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Validation error or refund amount exceeds available paid balance
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------
  # Returns
  # ---------------------------------------------------------------------
  /returns:
    get:
      tags: [Returns]
      summary: List the current user's return/exchange requests
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: status
          schema: { type: string, enum: [pending, approved, rejected, completed] }
        - in: query
          name: type
          schema: { type: string, enum: [exchange, return] }
      responses:
        '200':
          description: Return request list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ReturnRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
    post:
      tags: [Returns]
      summary: Create a return/exchange request (owner of the order only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, order_item_id, type, reason]
              properties:
                order_id: { type: integer }
                order_item_id: { type: integer }
                type: { type: string, enum: [exchange, return] }
                reason: { type: string, maxLength: 500 }
      responses:
        '200':
          description: >
            Return request created. `status` cannot be set by the client and is always
            initialized to `pending`; use the admin status endpoint to change it afterwards.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReturnRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

